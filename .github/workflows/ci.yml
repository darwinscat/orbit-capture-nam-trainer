name: ci

# Build, vet, and race-test on every PR and on pushes to main — the merge gate.
on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: macos-latest   # mac-first: the target platform
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
      - run: go build ./...
      - run: go vet ./...
      - run: go test -race ./...
      # Linux is a shipping target (amd64/arm64 tarballs) — compile the !darwin
      # build-tagged code at PR time, not first-time at a release tag.
      - run: GOOS=linux GOARCH=amd64 go build ./... && GOOS=linux GOARCH=arm64 go build ./... && GOOS=linux go vet ./...
